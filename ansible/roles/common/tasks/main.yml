---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install required packages
  apt:
    name:
      - curl
      - wget
      - git
      - net-tools
      - htop
    state: present

- name: Set timezone to UTC
  timezone:
    name: UTC

- name: Disable swap
  command: swapoff -a
  when: ansible_swaptotal_mb > 0
